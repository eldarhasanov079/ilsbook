<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const NEW_ORIGIN = "https://ilsb1.github.io";
        const OLD_BASE = "/ilsbook";
        const { pathname, search, hash } = window.location;

        let nextPath = "/";
        let trailingHash = "";

        if (hash.startsWith("#/")) {
          nextPath = hash.slice(1);
        } else {
          if (pathname === OLD_BASE || pathname === OLD_BASE + "/") {
            nextPath = "/";
          } else if (pathname.startsWith(OLD_BASE + "/")) {
            nextPath = pathname.slice(OLD_BASE.length);
          } else {
            nextPath = pathname || "/";
          }
          if (hash && hash !== "#") trailingHash = hash;
        }

        if (!nextPath.startsWith("/")) nextPath = "/" + nextPath;
        window.location.replace(NEW_ORIGIN + nextPath + search + trailingHash);
      })();
    </script>
  </head>
  <body></body>
</html>
